<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 24px;
            background: white;
        }
        .input-group input {
            border-radius: 10px 0 0 10px !important;
            border: 1.5px solid #e0e0e0;
            padding: 10px 16px;
            font-size: 0.95rem;
        }
        .input-group input:focus {
            border-color: #6c63ff;
            box-shadow: none;
        }
        .btn-add {
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 0 10px 10px 0 !important;
            padding: 10px 20px;
            font-weight: 500;
        }
        .btn-add:hover { background: #574fd6; color: white; }
        .task-list { margin-top: 16px; }
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border: 1.5px solid #ececec;
            transition: all 0.2s;
        }
        .task-item:hover { border-color: #6c63ff; background: #f3f2ff; }
        .task-title {
            font-size: 0.95rem;
            color: #333;
            font-weight: 500;
        }
        .task-title.done {
            text-decoration: line-through;
            color: #aaa;
        }
        .btn-done {
            background: #e8f5e9;
            color: #2e7d32;
            border: none;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-right: 6px;
        }
        .btn-done:hover { background: #c8e6c9; }
        .btn-delete {
            background: #fdecea;
            color: #c62828;
            border: none;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .btn-delete:hover { background: #ffcdd2; }
        .empty-msg {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="app-container"
